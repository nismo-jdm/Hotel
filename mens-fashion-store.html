<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOIR \u2014 Luxury Menswear</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C8A96E;
    --gold-dark: #A07840;
    --gold-light: #E8D5A0;
    --bg: #07070a;
    --card-bg: #141414;
    --card-bg2: #0d0d0d;
    --text: #F0EDE8;
    --text-muted: #888;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Helvetica Neue', Arial, sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); overflow-x: hidden; }
  img { display: block; max-width: 100%; }
  button { cursor: pointer; font-family: inherit; border: none; outline: none; }
  a { text-decoration: none; color: inherit; }

  /* \u2500\u2500 Utilities \u2500\u2500 */
  .gold { color: var(--gold); }
  .serif { font-family: var(--serif); }
  .uppercase { text-transform: uppercase; }
  .tracking-wide { letter-spacing: 0.4em; }
  .eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4em; color: var(--gold); }
  .section-title { font-family: var(--serif); font-size: clamp(36px,5vw,64px); color: var(--text); line-height: 1; font-weight: 700; }
  .btn-gold { background: linear-gradient(90deg, var(--gold), var(--gold-dark)); color: #000; font-weight: 700; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; border-radius: 50px; padding: 16px 32px; transition: transform .3s, box-shadow .3s; border: none; }
  .btn-gold:hover { transform: scale(1.05); box-shadow: 0 8px 24px rgba(200,169,110,.35); }
  .btn-outline { background: transparent; color: var(--gold); font-weight: 700; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; border-radius: 50px; padding: 16px 32px; border: 1px solid rgba(200,169,110,.4); transition: transform .3s, background .3s; }
  .btn-outline:hover { transform: scale(1.05); background: rgba(200,169,110,.07); }
  .section-border { border-top: 1px solid rgba(255,255,255,.04); }
  .fade-in { opacity: 0; transform: translateY(30px); transition: opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1); }
  .fade-in.visible { opacity: 1; transform: none; }
  .scrollbar-none { scrollbar-width: none; -ms-overflow-style: none; }
  .scrollbar-none::-webkit-scrollbar { display: none; }

  /* \u2500\u2500 Navbar \u2500\u2500 */
  #navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; transition: background .5s, backdrop-filter .5s, border-bottom .5s; }
  #navbar.scrolled { background: rgba(7,7,10,.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,.05); }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 16px 80px; }
  @media(max-width:768px){ .nav-inner { padding: 14px 24px; } }
  .nav-logo { font-family: var(--serif); font-size: 22px; font-weight: 900; letter-spacing: .25em; color: var(--text); }
  .nav-links { display: flex; gap: 32px; }
  @media(max-width:768px){ .nav-links { display: none; } }
  .nav-links a { font-size: 11px; font-weight: 700; letter-spacing: .25em; text-transform: uppercase; color: var(--text-muted); transition: color .2s; }
  .nav-links a:hover { color: var(--gold); }
  .nav-actions { display: flex; align-items: center; gap: 16px; }
  .nav-icon { background: none; color: var(--text-muted); display: flex; align-items: center; position: relative; }
  .cart-badge { position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; background: var(--gold); color: #000; border-radius: 50%; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .hamburger { display: none; background: none; color: var(--text-muted); font-size: 22px; }
  @media(max-width:768px){ .hamburger { display: block; } }
  .mobile-menu { display: none; flex-direction: column; gap: 16px; padding: 24px; background: rgba(7,7,10,.98); border-top: 1px solid rgba(255,255,255,.05); }
  .mobile-menu.open { display: flex; }
  .mobile-menu a { font-size: 13px; font-weight: 700; letter-spacing: .25em; text-transform: uppercase; color: var(--text-muted); }

  /* \u2500\u2500 Hero \u2500\u2500 */
  #hero { position: relative; min-height: 100vh; background: var(--bg); overflow: hidden; }
  #hero-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
  #hero-parallax { position: absolute; inset: 0; z-index: 2; will-change: transform; }
  #hero-parallax img
